<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deuses do Olimpo</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .celula{
            display: inline-block;
            padding: 10px;
            margin: 5px;
            border: 1px solid black;
            border-radius: 5px;
        }

        .destaque{
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Deuses do Olimpo</h1>

    <p>
        Os Deuses do Olimpo são as principais divindades da mitologia grega,
        que habitavam o Monte Olimpo.
    </p>

    <div id="olimpo"></div>

    <br><br>

    <input type="text" id="pesquisa" placeholder="Digite o nome do deus">

    <button onclick="buscarIndice()">
        Buscar Deus
    </button>

    <p id="resultado"></p>

    <script>

        const deuses = [
            "Zeus",
            "Hera",
            "Poseidon",
            "Deméter",
            "Atena",
            "Apolo",
            "Ártemis",
            "Ares",
            "Afrodite",
            "Hermes",
            "Hefesto",
            "Dionísio"
        ];

        const olimpo = document.getElementById("olimpo");
        const pesquisa = document.getElementById("pesquisa");
        const resultado = document.getElementById("resultado");

        for(let i = 0; i < deuses.length; i++){
            olimpo.innerHTML += `<div class="celula">${deuses[i]}</div>`;
        }

        function buscarIndice(){

            const celulas = document.querySelectorAll(".celula");

            // Remove o destaque anterior
            for(let i = 0; i < celulas.length; i++){
                celulas[i].classList.remove("destaque");
            }

            const nomeEscolhido = pesquisa.value.trim();

            let indice = -1;
            let i = 0;

            while(i < deuses.length){

                if(deuses[i].toLowerCase() == nomeEscolhido.toLowerCase()){
                    indice = i;
                    break;
                }

                i++;
            }

            if(indice != -1){
                celulas[indice].classList.add("destaque");
                resultado.innerHTML = "Índice encontrado: " + indice;
            }else{
                resultado.innerHTML = "Deus não encontrado!";
            }

        }

    </script>

</body>
</html>
